device : 'cuda'

dataset:
  name : "cifar10"
  transforms : 
    RandomHorizontalFlip : 
      p : 0.5

model: 
  name : "mobilenet_v3_small"
  output_classes : 10

training:
  epochs : 20
  lr : 0.01
  verbosity : 10
  batch_size : 64

poison:
  name : "badnets"
  poison_ratio : 0.10
  target_label : 7

  trigger : 

    placement : 
      random : false
      x_loc : 0
      y_loc : 0

    pattern : 
      - [[255,0,0], [255,0,0]]
      - [[255,0,0], [0,0,0]]