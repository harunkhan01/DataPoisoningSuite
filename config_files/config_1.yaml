device : 'cuda'

dataset:
  name : "cifar10"
  transforms : 
    RandomHorizontalFlip : 
      p : 0.5

model: 
  name : "mobilenet_v3_small"
  output_classes : 10

finetuning:
  training:
    epochs : 20
    lr: 0.01
    verbosity: 10
    batch_size: 64

  backbone:
    mode: "last_n"
    value: 4
  
  head:
    value: 0

poison:
  name : "badnets"
  poison_ratio : 0.01
  target_label : 7

  trigger : 

    placement : 
      random : false
      x_loc : 0
      y_loc : 0

    pattern : 
      - [[255,0,0], [255,0,0]]
      - [[255,0,0], [0,0,0]]